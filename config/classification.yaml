# ============================================================
#  КОНФИГ КЛАССИФИКАЦИИ — Шаманка (бот Таро)
# ============================================================
#  Задача: по тексту запроса ОДНОЗНАЧНО выбрать один расклад.
#
#  ГЛАВНЫЙ ПРИНЦИП — ПРИОРИТЕТ:
#  Правила проверяются СВЕРХУ ВНИЗ. Первое сработавшее правило
#  побеждает, остальные не проверяются. Поэтому специфичные
#  правила стоят выше общих. Это исключает "метания" между
#  двумя раскладами при пересечении триггеров.
#
#  Ключи spread_id ссылаются на config/spreads.yaml
#
#  Правила отсортированы по группам приоритета (priority):
#    1 — прямой формат вопроса (да/нет, выбор А/Б) — самый верх
#    2 — имя человека + чувство
#    3 — узкие тематические триггеры внутри сфер
#    4 — общие запросы сферы
#    5 — универсальный fallback (всегда последний)
# ============================================================

# ------------------------------------------------------------
#  ПРИОРИТЕТ 1 — ФОРМАТ ВОПРОСА (перекрывает любую сферу)
# ------------------------------------------------------------

- priority: 1
  spread_id: da_net
  intent: "Прямой закрытый вопрос, предполагающий ответ да или нет"
  triggers:
    - "да или нет"
    - "возьмут ли меня"
    - "одобрят ли"
    - "вернут ли долг"
    - "получится ли" # в форме закрытого вопроса
    - "стоит ли" # когда нет двух явных вариантов
  note: "Ловится ТОЛЬКО явный закрытый вопрос. Если есть два варианта — идёт в vybor_mezhdu_putyami (ниже, но приоритет тот же — см. проверку на два варианта первой)."

- priority: 1
  spread_id: vybor_mezhdu_putyami
  intent: "Явный выбор между двумя конкретными вариантами, независимо от сферы"
  triggers:
    - "или" # между двумя вариантами: уйти или остаться, А или Б
    - "уйти или остаться"
    - "уволиться или нет"
    - "расстаться или остаться"
    - "вернуться или нет"
    - "переехать или нет"
    - "согласиться или отказаться"
    - "что лучше: А или Б"
    - "два варианта"
    - "на распутье"
  note: "СПОРНОЕ→РЕШЕНО: 'переезд', 'уйти от партнёра', 'сменить работу' в форме выбора идут СЮДА, а не в свою сферу. Проверять ПЕРЕД da_net: если в вопросе два варианта — это выбор, а не да/нет."

# ------------------------------------------------------------
#  ПРИОРИТЕТ 2 — ИМЯ ЧЕЛОВЕКА + ЧУВСТВО
# ------------------------------------------------------------

- priority: 2
  spread_id: mysli_lyubimogo
  intent: "Вопрос о мыслях/чувствах конкретного названного человека"
  triggers:
    - "как ко мне относится [имя]"
    - "что думает обо мне [имя]"
    - "что чувствует [имя]"
    - "любит ли меня [имя]"
    - "нравлюсь ли я [имя]"
  note: "Срабатывает при наличии имени/указания на конкретного человека + чувство."

# ------------------------------------------------------------
#  ПРИОРИТЕТ 3 — УЗКИЕ ТЕМАТИЧЕСКИЕ ТРИГГЕРЫ
# ------------------------------------------------------------

# --- отношения ---
- priority: 3
  spread_id: vokzal_dlya_dvoih
  intent: "Что происходит в текущей паре прямо сейчас"
  triggers: ["что между нами", "как наши отношения", "что происходит в паре"]

- priority: 3
  spread_id: budushee_pary
  intent: "Перспектива текущих отношений"
  triggers: ["есть ли будущее", "стоит ли продолжать", "будут ли у нас отношения", "есть ли перспектива"]

- priority: 3
  spread_id: piramida
  intent: "Конфликт или кризис в паре"
  triggers: ["поссорились", "не можем договориться", "конфликт с партнёром", "кризис в отношениях", "не понимаем друг друга"]

- priority: 3
  spread_id: privlechenie_lyubvi
  intent: "Поиск новой любви, одиночество"
  triggers: ["найду ли любовь", "когда встречу", "как привлечь любовь", "одиночество"]

- priority: 3
  spread_id: istselenie_serdtsa
  intent: "Боль после расставания или потери"
  triggers: ["как пережить расставание", "как отпустить", "больно после разрыва", "как простить"]

- priority: 3
  spread_id: siren_i_klever
  intent: "Совместимость двух людей"
  triggers: ["совместимы ли мы", "подходим ли друг другу", "что нас объединяет и разделяет"]

# --- деньги ---
- priority: 3
  spread_id: situatsiya_deystvie_itog
  intent: "Что делать в финансовой ситуации"
  triggers: ["что делать с деньгами", "как исправить финансы", "как поступить с деньгами"]

# --- психология ---
- priority: 3
  spread_id: ten_yungianskiy
  intent: "Повторяющиеся паттерны, скрытые части себя"
  triggers: ["почему я повторяю", "почему одно и то же", "мои паттерны", "повторяющиеся сценарии"]
  note: "СПОРНОЕ→РЕШЕНО: 'почему я повторяю сценарии родителей' идёт СЮДА (психология паттерна), а не в семью."

- priority: 3
  spread_id: chakry
  intent: "Энергетические центры, баланс энергии"
  triggers: ["чакры", "энергетические центры", "баланс энергии"]

# --- духовность ---
- priority: 3
  spread_id: proshlaya_zhizn
  intent: "Предназначение, карма, прошлые жизни"
  triggers: ["предназначение", "миссия", "карма", "прошлая жизнь", "зачем я здесь", "смысл жизни"]

- priority: 3
  spread_id: vizit_k_predkam
  intent: "Влияние рода, предки, отношения с членом семьи"
  triggers: ["влияние рода", "родовые программы", "предки", "мама", "папа", "родители", "отношения с родителями"]
  note: "СПОРНОЕ→РЕШЕНО: 'отношения с родителями' как с людьми идут СЮДА. Только 'почему я повторяю сценарии родителей' → ten_yungianskiy."

- priority: 3
  spread_id: novolunie_polnolunie
  intent: "Лунная энергия, работа с циклом луны"
  triggers: ["новолуние", "полнолуние", "лунный цикл", "лунная энергия"]
  note: "СПОРНОЕ→РЕШЕНО: луна по умолчанию духовность, НЕ планирование времени."

# --- решения ---
- priority: 3
  spread_id: perekrestok
  intent: "Растерянность без конкретных вариантов"
  triggers: ["не знаю что делать", "не знаю как поступить", "запутался", "потерялся"]
  note: "В отличие от vybor_mezhdu_putyami — здесь НЕТ двух явных вариантов."

# --- время ---
- priority: 3
  spread_id: godovoy_rasklad
  intent: "Прогноз на год"
  triggers: ["на год", "каким будет год", "что меня ждёт в этом году", "расклад на год"]

- priority: 3
  spread_id: kvartalnyy
  intent: "Прогноз на квартал / три месяца"
  triggers: ["на квартал", "на три месяца", "ближайшие месяцы"]

# --- творчество ---
- priority: 3
  spread_id: rasklad_na_mechtu
  intent: "Мечта, большая цель, бизнес, свой проект"
  triggers: ["моя мечта", "большая цель", "творческий проект", "бизнес", "своё дело", "открыть бизнес", "стартап", "получится ли проект"]
  note: "СПОРНОЕ→РЕШЕНО: бизнес/своё дело идут СЮДА (файл так велит), а не в общую карьеру."

- priority: 3
  spread_id: strela_namerenie
  intent: "Первый шаг, намерение"
  triggers: ["первый шаг", "с чего начать", "намерение", "что меня держит"]

# --- здоровье ---
- priority: 3
  spread_id: balans_in_yan
  intent: "Выгорание, усталость, дисбаланс"
  triggers: ["выгорание", "выгорел", "истощение", "нет сил", "дисбаланс"]
  note: "СПОРНОЕ→РЕШЕНО: выгорание идёт в здоровье/баланс, НЕ в карьеру."

# ------------------------------------------------------------
#  ПРИОРИТЕТ 4 — ОБЩИЕ ЗАПРОСЫ СФЕРЫ
# ------------------------------------------------------------

- priority: 4
  spread_id: lyubovnyy_treugolnik
  intent: "Общий запрос об отношениях без конкретики"
  triggers: ["отношения", "любовь", "личная жизнь"]

- priority: 4
  spread_id: karera_i_prizvanie
  intent: "Общий запрос о карьере и работе"
  triggers: ["карьера", "работа", "призвание", "профессия", "повышение", "сменить работу"]

- priority: 4
  spread_id: finansy
  intent: "Общий запрос о деньгах"
  triggers: ["деньги", "финансы", "доход", "почему нет денег", "достаток"]

- priority: 4
  spread_id: yakor_samopoznanie
  intent: "Общий самоанализ, кто я"
  triggers: ["кто я", "хочу понять себя", "разобраться в себе"]

- priority: 4
  spread_id: telo_razum_duh
  intent: "Общее текущее состояние, самочувствие"
  triggers: ["моё состояние", "самочувствие", "как я сейчас", "здоровье"]
  note: "Здоровье как общее состояние → сюда. Медицинский дисклеймер обязателен (см. spreads_source.md ч.2)."

- priority: 4
  spread_id: vizit_k_predkam
  intent: "Общий запрос о семье"
  triggers: ["семья", "семейная ситуация", "атмосфера дома"]

# ------------------------------------------------------------
#  ПРИОРИТЕТ 5 — УНИВЕРСАЛЬНЫЙ FALLBACK (всегда последний)
# ------------------------------------------------------------

- priority: 5
  spread_id: proshloe_nastoyashee_budushee
  intent: "Запрос слишком общий, неоднозначный или без ключевых слов сферы"
  triggers: ["*"]
  note: "Срабатывает, если НИ ОДНО правило выше не подошло. Примеры: 'расскажи что меня ждёт', 'что дальше'."
