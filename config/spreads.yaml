# ============================================================
#  КОНФИГ РАСКЛАДОВ — Шаманка (бот Таро)
# ============================================================
#  Каждый расклад имеет ЗАФИКСИРОВАННЫЕ позиции.
#  Нейросеть НЕ придумывает позиции — берёт их отсюда.
#  Это гарантирует, что "Вокзал для двоих" всегда одинаковый.
#
#  Позиции сгенерированы по принципам алгоритма v2.0
#  (см. docs/spreads_source.md) и подлежат вычитке владельцем.
#  Чтобы изменить формулировку позиции — правь строку здесь.
#
#  ПОЛЯ РАСКЛАДА:
#    title      — фирменное название (показывается пользователю)
#    cards      — число карт (= число позиций)
#    sphere     — сфера (для аналитики)
#    summary    — краткая суть расклада (идёт в промпт трактовки)
#    positions  — список позиций по порядку; текст = смысл позиции
# ============================================================

# ------------------------------------------------------------
#  ОТНОШЕНИЯ И ЛЮБОВЬ
# ------------------------------------------------------------

