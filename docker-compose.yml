# Доступ к OpenRouter: Cloudflare блокирует РФ-IP этого VPS (403), поэтому
# LLM-трафик идёт через внешний SOCKS5-прокси — env OPENROUTER_PROXY в .env.
# (WireGuard-вариант не взлетел: дата-центр режет протокол по DPI.)
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    # Этот VPS (РФ) фильтрует часть IP-диапазона Telegram, а DNS отдаёт
    # заблокированный адрес. Пиним рабочий IP api.telegram.org.
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    depends_on:
      db:
        condition: service_healthy
    command: python -m src.bot

volumes:
  pgdata:
